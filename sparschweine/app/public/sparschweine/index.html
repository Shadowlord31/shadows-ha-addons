<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sparschweine</title>
<script>window.__BASE__="__INGRESS_BASE__";</script>
<style>
  :root {
    color-scheme: dark;
    --bg: #16130f;
    --bg-elevated: #1e1a15;
    --card: #221d17;
    --card-hover: #2a241c;
    --border: #352f26;
    --text: #f1ebe0;
    --text-muted: #a89d8c;
    --text-faint: #6f6555;
    --gold: #d9a544;
    --danger: #c0564f;
    --pos: #6fae5c;
    --neg: #cf6b62;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); padding: 20px; padding-bottom: 90px;
  }
  h1 {
    font-size: 1.5rem; font-weight: 700; letter-spacing: -0.01em;
    margin: 4px 0 20px; display: flex; justify-content: space-between; align-items: center;
    max-width: 1200px; margin-left: auto; margin-right: auto;
  }
  h1 .title-row { display: flex; align-items: center; gap: 10px; }
  .icon-btns { display: flex; gap: 2px; }
  .icon-btn {
    background: none; border: none; color: var(--text-muted); font-size: 1.25rem;
    cursor: pointer; padding: 8px 10px; border-radius: 10px; transition: background .15s;
  }
  .icon-btn:hover { background: var(--card-hover); color: var(--text); }
  .icon-btn.back { font-size: 1rem; font-weight: 600; color: var(--text); }

  .page { max-width: 1200px; margin: 0 auto; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--card); border-radius: 18px; padding: 18px 20px;
    cursor: pointer; border: 1px solid var(--border);
    transition: transform .12s ease, background .12s ease, border-color .12s ease;
    position: relative; overflow: hidden;
  }
  .card:hover { background: var(--card-hover); transform: translateY(-2px); border-color: color-mix(in srgb, var(--farbe, var(--gold)) 40%, var(--border)); }
  .card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--farbe, var(--gold));
  }
  .card.general::before { background: repeating-linear-gradient(180deg, var(--gold) 0 6px, transparent 6px 12px); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .card-avatar {
    width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 1.1rem; flex-shrink: 0;
    background: color-mix(in srgb, var(--farbe, var(--gold)) 22%, transparent);
  }
  .card-name-wrap { flex: 1; min-width: 0; }
  .card-name { font-weight: 600; font-size: 1.02rem; display: block; overflow-wrap: break-word; }
  .card-sub { font-size: 0.75rem; color: var(--text-faint); margin-top: 2px; }
  .card-stand { font-weight: 700; font-size: 1.35rem; margin-top: 14px; letter-spacing: -0.01em; }
  .bar-bg { background: var(--bg-elevated); border-radius: 6px; height: 7px; margin-top: 12px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--farbe, var(--gold)); border-radius: 6px; }
  .card-ziel { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; }

  .fab {
    position: fixed; bottom: 22px; right: 22px; width: 58px; height: 58px;
    border-radius: 50%; background: var(--gold); border: none; color: #1a1509;
    font-size: 1.9rem; font-weight: 600; box-shadow: 0 6px 18px rgba(0,0,0,.45);
    cursor: pointer; transition: transform .12s;
  }
  .fab:hover { transform: scale(1.05); }

  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.65);
    display: none; align-items: flex-end; justify-content: center; z-index: 10;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--bg-elevated); width: 100%; max-width: 480px; border-radius: 20px 20px 0 0;
    padding: 22px; padding-bottom: 32px; max-height: 88vh; overflow-y: auto;
    border: 1px solid var(--border); border-bottom: none;
  }
  .modal h2 { margin-top: 0; font-size: 1.15rem; display: flex; justify-content: space-between; align-items: center; }
  .modal label { font-size: 0.82rem; color: var(--text-muted); }
  .modal input, .modal select {
    width: 100%; padding: 11px; margin: 6px 0 14px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 1rem;
  }
  .modal-actions { display: flex; gap: 10px; }
  .modal-actions button { flex: 1; padding: 11px; border-radius: 10px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .btn-primary { background: var(--gold); color: #1a1509; }
  .btn-secondary { background: var(--card-hover); color: var(--text); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-close { background: none; border: none; color: var(--text-muted); font-size: 1.3rem; cursor: pointer; }
  .empty { text-align: center; color: var(--text-faint); margin-top: 60px; }

  /* Detailseite */
  #view-detail { display: none; }
  .detail-header { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
  .detail-avatar {
    width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 1.6rem; flex-shrink: 0;
    background: color-mix(in srgb, var(--detail-farbe, var(--gold)) 22%, transparent);
  }
  .detail-title { flex: 1; min-width: 0; }
  .detail-name { font-size: 1.3rem; font-weight: 700; }
  .detail-stand { font-size: 1.1rem; color: var(--text-muted); margin-top: 2px; }
  .detail-progress-wrap { max-width: 420px; margin: 18px 0; }
  .detail-actions { display: flex; gap: 10px; margin: 18px 0 6px; flex-wrap: wrap; }
  .detail-actions button {
    padding: 10px 16px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; font-size: 0.92rem;
  }
  .entry-list { margin-top: 18px; max-width: 640px; }
  .entry-list-title { font-size: 0.85rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: .04em; margin: 20px 0 8px; }
  .entry-row {
    display: flex; align-items: center; gap: 12px; padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .entry-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .entry-main { flex: 1; min-width: 0; }
  .entry-kat { font-size: 0.76rem; color: var(--text-faint); }
  .entry-beschr { font-size: 0.95rem; }
  .entry-datum { font-size: 0.72rem; color: var(--text-faint); }
  .entry-betrag { font-weight: 700; white-space: nowrap; }
  .entry-betrag.pos { color: var(--pos); }
  .entry-betrag.neg { color: var(--neg); }
  .entry-del { background: none; border: none; color: var(--text-faint); font-size: 1rem; padding: 4px; cursor: pointer; }
  .entry-del:hover { color: var(--danger); }

  .kat-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .kat-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .kat-name { flex: 1; }

  /* Statistik */
  #view-stats { display: none; }
  .month-picker {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    margin: 4px auto 24px; max-width: 320px;
  }
  .month-picker button {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    width: 38px; height: 38px; border-radius: 50%; font-size: 1.1rem; cursor: pointer;
  }
  .month-picker button:hover { background: var(--card-hover); }
  .month-label { font-weight: 600; font-size: 1.05rem; min-width: 140px; text-align: center; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; max-width: 1200px; margin: 0 auto; }
  .stat-row { background: var(--card); border-radius: 16px; padding: 16px 18px; border: 1px solid var(--border); cursor: pointer; transition: background .12s, transform .12s; }
  .stat-row:hover { background: var(--card-hover); transform: translateY(-2px); }
  .stat-head { display: flex; justify-content: space-between; font-size: 0.95rem; margin-bottom: 8px; font-weight: 600; }
  .stat-bar-bg { background: var(--bg-elevated); border-radius: 6px; height: 9px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 6px; }
  .stat-sub { font-size: 0.76rem; color: var(--text-faint); margin-top: 8px; }

  .toast {
    position: fixed; bottom: 92px; left: 50%; transform: translateX(-50%);
    background: var(--bg-elevated); border: 1px solid var(--border); padding: 10px 18px; border-radius: 10px; font-size: 0.9rem;
    opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 20;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="view-main" class="page">
  <h1>
    <span class="title-row">🐷 Sparschweine</span>
    <span class="icon-btns">
      <button class="icon-btn" onclick="openStats()" title="Statistik">📊</button>
      <button class="icon-btn" onclick="openKategorien()" title="Kategorien">🏷️</button>
      <button class="icon-btn" onclick="openNewPig()" title="Neues Sparschwein">🐷➕</button>
    </span>
  </h1>
  <div id="grid" class="grid"></div>
  <button class="fab" onclick="openGeneralEntry()" title="Buchen">+</button>
</div>

<div id="view-detail" class="page">
  <button class="icon-btn back" onclick="closeDetail()">← Zurück</button>
  <div class="detail-header" style="margin-top:14px">
    <div class="detail-avatar" id="detail-avatar">🐷</div>
    <div class="detail-title">
      <div class="detail-name" id="detail-name"></div>
      <div class="detail-stand" id="detail-stand"></div>
    </div>
  </div>
  <div class="detail-progress-wrap" id="detail-progress"></div>
  <div class="detail-actions" id="detail-pig-actions">
    <button class="btn-secondary" onclick="openEditPigFromDetail()">✏️ Bearbeiten</button>
    <button class="btn-danger" onclick="deletePigFromDetail()">🗑️ Löschen</button>
  </div>
  <div class="detail-actions">
    <button class="btn-primary" onclick="openEntry()">💰 Buchen</button>
  </div>
  <div class="entry-list">
    <div class="entry-list-title">Buchungen</div>
    <div id="detail-entries"></div>
  </div>
</div>

<div id="view-stats" class="page">
  <h1><button class="icon-btn back" onclick="closeStats()">← Zurück</button> Statistik</h1>
  <div class="month-picker">
    <button onclick="shiftStatsMonth(-1)">‹</button>
    <span class="month-label" id="stats-month-label"></span>
    <button onclick="shiftStatsMonth(1)">›</button>
  </div>
  <div id="stats-list" class="stats-grid"></div>
  <div id="stats-empty" class="empty" style="display:none">Keine Buchungen in diesem Monat.</div>
</div>

<div id="view-stat-detail" class="page">
  <button class="icon-btn back" onclick="closeStatDetail()">← Zurück</button>
  <div class="detail-header" style="margin-top:14px">
    <div class="detail-avatar" id="stat-detail-avatar">🏷️</div>
    <div class="detail-title">
      <div class="detail-name" id="stat-detail-name"></div>
      <div class="detail-stand" id="stat-detail-month"></div>
    </div>
  </div>
  <div class="entry-list">
    <div class="entry-list-title">Buchungen</div>
    <div id="stat-detail-entries"></div>
  </div>
</div>

<div class="modal-bg" id="modal-pig">
  <div class="modal">
    <h2 id="pig-modal-title">Neues Sparschwein</h2>
    <input type="hidden" id="pig-id">
    <label>Name</label>
    <input type="text" id="pig-name" placeholder="z.B. Urlaub">
    <label>Zielbetrag (optional)</label>
    <input type="number" id="pig-ziel" placeholder="z.B. 500" step="0.01">
    <label>Farbe</label>
    <input type="color" id="pig-farbe" value="#4CAF50">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('modal-pig')">Abbrechen</button>
      <button class="btn-primary" onclick="savePig()">Speichern</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-entry">
  <div class="modal">
    <h2>Buchen</h2>
    <label>Sparschwein</label>
    <select id="entry-sparschwein"><option value="">Kein Sparschwein</option></select>
    <label>Betrag (negativ = Abheben)</label>
    <input type="number" id="entry-betrag" step="0.01" placeholder="z.B. 20 oder -10">
    <label>Kategorie</label>
    <select id="entry-kategorie"><option value="">Keine</option></select>
    <label>Beschreibung (optional)</label>
    <input type="text" id="entry-beschreibung" placeholder="z.B. Trinkgeld">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('modal-entry')">Abbrechen</button>
      <button class="btn-primary" onclick="saveEntry()">Buchen</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-kategorien">
  <div class="modal">
    <h2>Kategorien<button class="btn-close" onclick="closeModal('modal-kategorien')">✕</button></h2>
    <div id="kat-list"></div>
    <label style="margin-top:12px; display:block">Neue Kategorie</label>
    <input type="text" id="kat-name" placeholder="z.B. Trinkgeld">
    <input type="color" id="kat-farbe" value="#888888">
    <div class="modal-actions">
      <button class="btn-primary" style="flex:none; width:100%" onclick="addKategorie()">Hinzufügen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let pigs = [];
let kategorien = [];
let ohneSparschwein = { kontostand: 0, eintraege: [] };
let currentMode = null; // 'pig' | 'general'
let currentPigId = null;
let statsMonth = new Date().toISOString().substring(0, 7); // YYYY-MM
const base = () => window.__BASE__ || '';

async function api(method, url, body) {
  const res = await fetch(base() + url, {
    method, headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || res.statusText); }
  return res.json();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showView(id) {
  for (const v of ['view-main', 'view-detail', 'view-stats', 'view-stat-detail']) {
    document.getElementById(v).style.display = (v === id) ? 'block' : 'none';
  }
}

async function loadAll() {
  [pigs, kategorien, ohneSparschwein] = await Promise.all([
    api('GET', '/api/sparschweine'),
    api('GET', '/api/kategorien'),
    api('GET', '/api/ohne-sparschwein'),
  ]);
  render();
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const generalCard = document.createElement('div');
  generalCard.className = 'card general';
  generalCard.onclick = () => openDetail(null);
  generalCard.innerHTML = `
    <div class="card-top">
      <div class="card-avatar">🏷️</div>
      <div class="card-name-wrap">
        <span class="card-name">Ohne Sparschwein</span>
        <div class="card-sub">z.B. Trinkgeld</div>
      </div>
    </div>
    <div class="card-stand">${ohneSparschwein.kontostand.toFixed(2)} €</div>
  `;
  grid.appendChild(generalCard);

  for (const p of pigs) {
    const pct = p.zielbetrag ? Math.min(100, Math.round((p.kontostand / p.zielbetrag) * 100)) : null;
    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--farbe', p.farbe);
    card.onclick = () => openDetail(p.id);
    card.innerHTML = `
      <div class="card-top">
        <div class="card-avatar">🐷</div>
        <div class="card-name-wrap">
          <span class="card-name">${p.name}</span>
          ${p.zielbetrag ? `<div class="card-sub">Ziel: ${p.zielbetrag.toFixed(2)} €</div>` : ''}
        </div>
      </div>
      <div class="card-stand">${p.kontostand.toFixed(2)} €</div>
      ${p.zielbetrag ? `
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="card-ziel">${pct}% erreicht</div>
      ` : ''}
    `;
    grid.appendChild(card);
  }
}

// ─── Sparschwein anlegen/bearbeiten ──────────────────────────────────────
function openNewPig() {
  document.getElementById('pig-modal-title').textContent = 'Neues Sparschwein';
  document.getElementById('pig-id').value = '';
  document.getElementById('pig-name').value = '';
  document.getElementById('pig-ziel').value = '';
  document.getElementById('pig-farbe').value = '#4CAF50';
  openModal('modal-pig');
}

function openEditPigFromDetail() {
  const p = pigs.find(x => x.id === currentPigId);
  document.getElementById('pig-modal-title').textContent = 'Sparschwein bearbeiten';
  document.getElementById('pig-id').value = p.id;
  document.getElementById('pig-name').value = p.name;
  document.getElementById('pig-ziel').value = p.zielbetrag ?? '';
  document.getElementById('pig-farbe').value = p.farbe;
  openModal('modal-pig');
}

async function savePig() {
  const id = document.getElementById('pig-id').value;
  const name = document.getElementById('pig-name').value;
  const zielbetrag = document.getElementById('pig-ziel').value;
  const farbe = document.getElementById('pig-farbe').value;
  try {
    if (id) await api('PUT', `/api/sparschweine/${id}`, { name, zielbetrag, farbe });
    else await api('POST', '/api/sparschweine', { name, zielbetrag, farbe });
    closeModal('modal-pig'); toast('Gespeichert'); await loadAll();
    if (id && currentMode === 'pig') renderDetail();
  } catch (e) { toast(e.message); }
}

async function deletePigFromDetail() {
  if (!confirm('Sparschwein löschen? Buchungen bleiben erhalten und wandern zu "Ohne Sparschwein".')) return;
  await api('DELETE', `/api/sparschweine/${currentPigId}`);
  toast('Gelöscht'); await loadAll(); closeDetail();
}

// ─── Detailseite (Sparschwein ODER "Ohne Sparschwein") ────────────────────
function renderDetail() {
  const isGeneral = currentMode === 'general';
  const data = isGeneral ? ohneSparschwein : pigs.find(x => x.id === currentPigId);
  if (!data) return;

  const farbe = isGeneral ? '#d9a544' : data.farbe;
  document.documentElement.style.setProperty('--detail-farbe', farbe);
  document.getElementById('detail-avatar').textContent = isGeneral ? '🏷️' : '🐷';
  document.getElementById('detail-name').textContent = isGeneral ? 'Ohne Sparschwein' : data.name;
  document.getElementById('detail-stand').textContent = data.kontostand.toFixed(2) + ' €';
  document.getElementById('detail-pig-actions').style.display = isGeneral ? 'none' : 'flex';

  const progressEl = document.getElementById('detail-progress');
  if (!isGeneral && data.zielbetrag) {
    const pct = Math.min(100, Math.round((data.kontostand / data.zielbetrag) * 100));
    progressEl.innerHTML = `
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${data.farbe}"></div></div>
      <div class="card-ziel">${pct}% von ${data.zielbetrag.toFixed(2)} €</div>`;
  } else {
    progressEl.innerHTML = '';
  }

  const list = document.getElementById('detail-entries');
  if (!data.eintraege.length) {
    list.innerHTML = '<div class="empty" style="margin-top:20px">Noch keine Buchungen.</div>';
    return;
  }
  list.innerHTML = data.eintraege.map(e => `
    <div class="entry-row">
      <div class="entry-dot" style="background:${e.kategorie_farbe || '#555'}"></div>
      <div class="entry-main">
        <div class="entry-beschr">${e.beschreibung || (e.betrag > 0 ? 'Einzahlung' : 'Abhebung')}</div>
        <div class="entry-kat">${e.kategorie_name || 'Ohne Kategorie'} · <span class="entry-datum">${e.datum}</span></div>
      </div>
      <div class="entry-betrag ${e.betrag > 0 ? 'pos' : 'neg'}">${e.betrag > 0 ? '+' : ''}${e.betrag.toFixed(2)} €</div>
      <button class="entry-del" onclick="deleteEntry('${e.id}')">🗑️</button>
    </div>
  `).join('');
}

function openDetail(id) {
  currentMode = id ? 'pig' : 'general';
  currentPigId = id;
  renderDetail();
  showView('view-detail');
}

function closeDetail() {
  showView('view-main');
}

async function deleteEntry(entryId) {
  if (!confirm('Buchung löschen?')) return;
  await api('DELETE', `/api/spareintraege/${entryId}`);
  await loadAll();
  renderDetail();
}

// ─── Buchen (mit optionaler Sparschwein-Zuordnung) ────────────────────────
function openGeneralEntry() {
  currentMode = 'general';
  currentPigId = null;
  openEntry();
}

function openEntry() {
  document.getElementById('entry-betrag').value = '';
  document.getElementById('entry-beschreibung').value = '';

  const katSel = document.getElementById('entry-kategorie');
  katSel.innerHTML = '<option value="">Keine</option>' +
    kategorien.map(k => `<option value="${k.id}">${k.name}</option>`).join('');

  const pigSel = document.getElementById('entry-sparschwein');
  pigSel.innerHTML = '<option value="">Kein Sparschwein</option>' +
    pigs.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  pigSel.value = currentMode === 'pig' ? currentPigId : '';

  openModal('modal-entry');
}

async function saveEntry() {
  const betrag = document.getElementById('entry-betrag').value;
  const beschreibung = document.getElementById('entry-beschreibung').value;
  const kategorie_id = document.getElementById('entry-kategorie').value;
  const sparschwein_id = document.getElementById('entry-sparschwein').value;
  try {
    await api('POST', '/api/eintraege', { betrag, beschreibung, kategorie_id, sparschwein_id });
    closeModal('modal-entry'); toast('Gebucht');
    await loadAll();
    if (document.getElementById('view-detail').style.display === 'block') renderDetail();
  } catch (e) { toast(e.message); }
}

// ─── Kategorien ──────────────────────────────────────────────────────────
function renderKatList() {
  const list = document.getElementById('kat-list');
  if (!kategorien.length) { list.innerHTML = '<div class="empty" style="margin-top:8px">Noch keine Kategorien.</div>'; return; }
  list.innerHTML = kategorien.map(k => `
    <div class="kat-row">
      <div class="kat-dot" style="background:${k.farbe}"></div>
      <div class="kat-name">${k.name}</div>
      <button class="entry-del" onclick="deleteKategorie('${k.id}')">🗑️</button>
    </div>
  `).join('');
}

function openKategorien() {
  renderKatList();
  document.getElementById('kat-name').value = '';
  document.getElementById('kat-farbe').value = '#888888';
  openModal('modal-kategorien');
}

async function addKategorie() {
  const name = document.getElementById('kat-name').value;
  const farbe = document.getElementById('kat-farbe').value;
  if (!name.trim()) { toast('Name fehlt'); return; }
  try {
    await api('POST', '/api/kategorien', { name, farbe });
    kategorien = await api('GET', '/api/kategorien');
    document.getElementById('kat-name').value = '';
    renderKatList();
    toast('Kategorie angelegt');
  } catch (e) { toast(e.message); }
}

async function deleteKategorie(id) {
  if (!confirm('Kategorie löschen? Buchungen bleiben erhalten, verlieren aber die Zuordnung.')) return;
  await api('DELETE', `/api/kategorien/${id}`);
  kategorien = await api('GET', '/api/kategorien');
  renderKatList();
  await loadAll();
}

// ─── Statistik (mit Monatsauswahl) ────────────────────────────────────────
function monthLabel(ym) {
  const [y, m] = ym.split('-').map(Number);
  const d = new Date(y, m - 1, 1);
  return d.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
}

function shiftStatsMonth(delta) {
  const [y, m] = statsMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  statsMonth = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
  renderStats();
}

async function renderStats() {
  document.getElementById('stats-month-label').textContent = monthLabel(statsMonth);
  const rows = await api('GET', `/api/statistik?month=${statsMonth}`);
  const list = document.getElementById('stats-list');
  const empty = document.getElementById('stats-empty');
  empty.style.display = rows.length ? 'none' : 'block';
  const max = Math.max(1, ...rows.map(r => Math.abs(r.summe)));
  list.innerHTML = rows.map(r => `
    <div class="stat-row" onclick="openStatDetail('${r.kategorie_id || 'none'}', '${(r.name || '').replace(/'/g, "\\'")}', '${r.farbe}')">
      <div class="stat-head">
        <span>${r.name}</span>
        <span>${r.summe.toFixed(2)} €</span>
      </div>
      <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${Math.round(Math.abs(r.summe)/max*100)}%;background:${r.farbe}"></div></div>
      <div class="stat-sub">${r.anzahl} Buchung(en) · +${r.einzahlungen.toFixed(2)} € / -${r.abhebungen.toFixed(2)} €</div>
    </div>
  `).join('');
}

function openStats() {
  statsMonth = new Date().toISOString().substring(0, 7);
  renderStats();
  showView('view-stats');
}
function closeStats() {
  showView('view-main');
}

// ─── Statistik-Drilldown: Buchungen einer Kategorie im gewaehlten Monat ──
let currentStatKategorie = null;

async function openStatDetail(kategorieId, name, farbe) {
  currentStatKategorie = kategorieId;
  document.documentElement.style.setProperty('--detail-farbe', farbe);
  document.getElementById('stat-detail-name').textContent = name;
  document.getElementById('stat-detail-month').textContent = monthLabel(statsMonth);
  await renderStatDetail();
  showView('view-stat-detail');
}

async function renderStatDetail() {
  const rows = await api('GET', `/api/statistik/eintraege?kategorie_id=${currentStatKategorie}&month=${statsMonth}`);
  const list = document.getElementById('stat-detail-entries');
  if (!rows.length) {
    list.innerHTML = '<div class="empty" style="margin-top:20px">Keine Buchungen in diesem Monat.</div>';
    return;
  }
  list.innerHTML = rows.map(e => `
    <div class="entry-row">
      <div class="entry-dot" style="background:${e.kategorie_farbe || '#555'}"></div>
      <div class="entry-main">
        <div class="entry-beschr">${e.beschreibung || (e.betrag > 0 ? 'Einzahlung' : 'Abhebung')}</div>
        <div class="entry-kat">${e.sparschwein_name || 'Ohne Sparschwein'} · <span class="entry-datum">${e.datum}</span></div>
      </div>
      <div class="entry-betrag ${e.betrag > 0 ? 'pos' : 'neg'}">${e.betrag > 0 ? '+' : ''}${e.betrag.toFixed(2)} €</div>
      <button class="entry-del" onclick="deleteStatEntry('${e.id}')">🗑️</button>
    </div>
  `).join('');
}

async function deleteStatEntry(entryId) {
  if (!confirm('Buchung löschen?')) return;
  await api('DELETE', `/api/spareintraege/${entryId}`);
  await loadAll();
  await renderStatDetail();
}

function closeStatDetail() {
  showView('view-stats');
}

loadAll();
</script>
</body>
</html>
