<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sparschweine</title>
<script>window.__BASE__="__INGRESS_BASE__";</script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, Roboto, sans-serif;
    background: #121212; color: #eee; padding: 16px; padding-bottom: 80px;
  }
  h1 { font-size: 1.4rem; margin: 4px 0 16px; display: flex; justify-content: space-between; align-items: center; }
  .icon-btns { display: flex; gap: 4px; }
  .icon-btn { background: none; border: none; color: #aaa; font-size: 1.2rem; cursor: pointer; padding: 4px 6px; }
  .grid { display: grid; gap: 12px; }
  .card {
    background: #1e1e1e; border-radius: 14px; padding: 14px 16px;
    border-left: 6px solid var(--farbe, #4CAF50); cursor: pointer;
  }
  .card.general { border-left-style: dashed; }
  .card-top { display: flex; justify-content: space-between; align-items: baseline; }
  .card-name { font-weight: 600; font-size: 1.05rem; }
  .card-stand { font-weight: 700; font-size: 1.1rem; }
  .bar-bg { background: #333; border-radius: 6px; height: 8px; margin-top: 10px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--farbe, #4CAF50); }
  .card-ziel { font-size: 0.8rem; color: #999; margin-top: 4px; }
  .fab {
    position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px;
    border-radius: 50%; background: #4CAF50; border: none; color: white;
    font-size: 1.8rem; box-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: none; align-items: flex-end; justify-content: center; z-index: 10;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #1e1e1e; width: 100%; max-width: 480px; border-radius: 16px 16px 0 0;
    padding: 20px; padding-bottom: 32px; max-height: 88vh; overflow-y: auto;
  }
  .modal h2 { margin-top: 0; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; }
  .modal input, .modal select {
    width: 100%; padding: 10px; margin: 6px 0 12px; border-radius: 8px;
    border: 1px solid #444; background: #121212; color: #eee; font-size: 1rem;
  }
  .modal-actions { display: flex; gap: 10px; }
  .modal-actions button { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 1rem; }
  .btn-primary { background: #4CAF50; color: white; }
  .btn-secondary { background: #333; color: #eee; }
  .btn-danger { background: #b23c3c; color: white; }
  .btn-close { background: none; border: none; color: #aaa; font-size: 1.3rem; }
  .empty { text-align: center; color: #888; margin-top: 60px; }

  .detail-stand { font-size: 1.6rem; font-weight: 700; margin: 4px 0 14px; }
  .entry-list { margin-top: 14px; }
  .entry-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid #2a2a2a;
  }
  .entry-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .entry-main { flex: 1; min-width: 0; }
  .entry-kat { font-size: 0.75rem; color: #999; }
  .entry-beschr { font-size: 0.9rem; }
  .entry-datum { font-size: 0.7rem; color: #777; }
  .entry-betrag { font-weight: 600; white-space: nowrap; }
  .entry-betrag.pos { color: #4CAF50; }
  .entry-betrag.neg { color: #e57373; }
  .entry-del { background: none; border: none; color: #666; font-size: 1rem; padding: 4px; }

  .kat-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #2a2a2a; }
  .kat-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .kat-name { flex: 1; }

  #view-stats { display: none; }
  .stat-row { margin-bottom: 16px; }
  .stat-head { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 4px; }
  .stat-bar-bg { background: #262626; border-radius: 6px; height: 10px; overflow: hidden; }
  .stat-bar-fill { height: 100%; }
  .stat-sub { font-size: 0.75rem; color: #888; margin-top: 3px; }

  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #333; padding: 10px 16px; border-radius: 8px; font-size: 0.9rem;
    opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 20;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="view-main">
  <h1>🐷 Sparschweine
    <span class="icon-btns">
      <button class="icon-btn" onclick="openStats()" title="Statistik">📊</button>
      <button class="icon-btn" onclick="openKategorien()" title="Kategorien">🏷️</button>
    </span>
  </h1>
  <div id="grid" class="grid"></div>
  <button class="fab" onclick="openNewPig()">+</button>
</div>

<div id="view-stats">
  <h1><button class="icon-btn" onclick="closeStats()">← Zurück</button> Statistik</h1>
  <div id="stats-list"></div>
  <div id="stats-empty" class="empty" style="display:none">Noch keine Buchungen vorhanden.</div>
</div>

<div class="modal-bg" id="modal-pig">
  <div class="modal">
    <h2 id="pig-modal-title">Neues Sparschwein</h2>
    <input type="hidden" id="pig-id">
    <label>Name</label>
    <input type="text" id="pig-name" placeholder="z.B. Urlaub">
    <label>Zielbetrag (optional)</label>
    <input type="number" id="pig-ziel" placeholder="z.B. 500" step="0.01">
    <label>Farbe</label>
    <input type="color" id="pig-farbe" value="#4CAF50">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('modal-pig')">Abbrechen</button>
      <button class="btn-primary" onclick="savePig()">Speichern</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-detail">
  <div class="modal">
    <h2><span id="detail-name"></span><button class="btn-close" onclick="closeModal('modal-detail')">✕</button></h2>
    <div class="detail-stand" id="detail-stand"></div>
    <div id="detail-progress"></div>
    <div class="modal-actions" id="detail-pig-actions">
      <button class="btn-secondary" onclick="openEditPigFromDetail()">✏️ Bearbeiten</button>
      <button class="btn-danger" onclick="deletePigFromDetail()">🗑️ Löschen</button>
    </div>
    <div class="modal-actions" style="margin-top:8px">
      <button class="btn-primary" onclick="openEntry()">💰 Buchen</button>
    </div>
    <div class="entry-list" id="detail-entries"></div>
  </div>
</div>

<div class="modal-bg" id="modal-entry">
  <div class="modal">
    <h2>Buchen</h2>
    <label>Sparschwein</label>
    <select id="entry-sparschwein"><option value="">Kein Sparschwein</option></select>
    <label>Betrag (negativ = Abheben)</label>
    <input type="number" id="entry-betrag" step="0.01" placeholder="z.B. 20 oder -10">
    <label>Kategorie</label>
    <select id="entry-kategorie"><option value="">Keine</option></select>
    <label>Beschreibung (optional)</label>
    <input type="text" id="entry-beschreibung" placeholder="z.B. Trinkgeld">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('modal-entry')">Abbrechen</button>
      <button class="btn-primary" onclick="saveEntry()">Buchen</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-kategorien">
  <div class="modal">
    <h2>Kategorien<button class="btn-close" onclick="closeModal('modal-kategorien')">✕</button></h2>
    <div id="kat-list"></div>
    <label style="margin-top:12px; display:block">Neue Kategorie</label>
    <input type="text" id="kat-name" placeholder="z.B. Trinkgeld">
    <input type="color" id="kat-farbe" value="#888888">
    <div class="modal-actions">
      <button class="btn-primary" style="flex:none; width:100%" onclick="addKategorie()">Hinzufügen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let pigs = [];
let kategorien = [];
let ohneSparschwein = { kontostand: 0, eintraege: [] };
let currentMode = null; // 'pig' | 'general'
let currentPigId = null;
const base = () => window.__BASE__ || '';

async function api(method, url, body) {
  const res = await fetch(base() + url, {
    method, headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || res.statusText); }
  return res.json();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function loadAll() {
  [pigs, kategorien, ohneSparschwein] = await Promise.all([
    api('GET', '/api/sparschweine'),
    api('GET', '/api/kategorien'),
    api('GET', '/api/ohne-sparschwein'),
  ]);
  render();
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const generalCard = document.createElement('div');
  generalCard.className = 'card general';
  generalCard.style.setProperty('--farbe', '#888888');
  generalCard.onclick = () => openDetail(null);
  generalCard.innerHTML = `
    <div class="card-top">
      <span class="card-name">🏷️ Ohne Sparschwein</span>
      <span class="card-stand">${ohneSparschwein.kontostand.toFixed(2)} €</span>
    </div>
    <div class="card-ziel">Buchungen ohne festes Sparziel, z.B. Trinkgeld</div>
  `;
  grid.appendChild(generalCard);

  for (const p of pigs) {
    const pct = p.zielbetrag ? Math.min(100, Math.round((p.kontostand / p.zielbetrag) * 100)) : null;
    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--farbe', p.farbe);
    card.onclick = () => openDetail(p.id);
    card.innerHTML = `
      <div class="card-top">
        <span class="card-name">${p.name}</span>
        <span class="card-stand">${p.kontostand.toFixed(2)} €</span>
      </div>
      ${p.zielbetrag ? `
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="card-ziel">${pct}% von ${p.zielbetrag.toFixed(2)} €</div>
      ` : ''}
    `;
    grid.appendChild(card);
  }
}

// ─── Sparschwein anlegen/bearbeiten ──────────────────────────────────────
function openNewPig() {
  document.getElementById('pig-modal-title').textContent = 'Neues Sparschwein';
  document.getElementById('pig-id').value = '';
  document.getElementById('pig-name').value = '';
  document.getElementById('pig-ziel').value = '';
  document.getElementById('pig-farbe').value = '#4CAF50';
  openModal('modal-pig');
}

function openEditPigFromDetail() {
  const p = pigs.find(x => x.id === currentPigId);
  document.getElementById('pig-modal-title').textContent = 'Sparschwein bearbeiten';
  document.getElementById('pig-id').value = p.id;
  document.getElementById('pig-name').value = p.name;
  document.getElementById('pig-ziel').value = p.zielbetrag ?? '';
  document.getElementById('pig-farbe').value = p.farbe;
  closeModal('modal-detail');
  openModal('modal-pig');
}

async function savePig() {
  const id = document.getElementById('pig-id').value;
  const name = document.getElementById('pig-name').value;
  const zielbetrag = document.getElementById('pig-ziel').value;
  const farbe = document.getElementById('pig-farbe').value;
  try {
    if (id) await api('PUT', `/api/sparschweine/${id}`, { name, zielbetrag, farbe });
    else await api('POST', '/api/sparschweine', { name, zielbetrag, farbe });
    closeModal('modal-pig'); toast('Gespeichert'); await loadAll();
  } catch (e) { toast(e.message); }
}

async function deletePigFromDetail() {
  if (!confirm('Sparschwein löschen? Buchungen bleiben erhalten und wandern zu "Ohne Sparschwein".')) return;
  await api('DELETE', `/api/sparschweine/${currentPigId}`);
  closeModal('modal-detail'); toast('Gelöscht'); await loadAll();
}

// ─── Detailansicht (Sparschwein ODER "Ohne Sparschwein") ─────────────────
function renderDetail() {
  const isGeneral = currentMode === 'general';
  const data = isGeneral ? ohneSparschwein : pigs.find(x => x.id === currentPigId);
  if (!data) return;

  document.getElementById('detail-name').textContent = isGeneral ? '🏷️ Ohne Sparschwein' : data.name;
  document.getElementById('detail-stand').textContent = data.kontostand.toFixed(2) + ' €';
  document.getElementById('detail-stand').style.color = isGeneral ? '#888' : data.farbe;
  document.getElementById('detail-pig-actions').style.display = isGeneral ? 'none' : 'flex';

  const progressEl = document.getElementById('detail-progress');
  if (!isGeneral && data.zielbetrag) {
    const pct = Math.min(100, Math.round((data.kontostand / data.zielbetrag) * 100));
    progressEl.innerHTML = `
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${data.farbe}"></div></div>
      <div class="card-ziel">${pct}% von ${data.zielbetrag.toFixed(2)} €</div>`;
  } else {
    progressEl.innerHTML = '';
  }

  const list = document.getElementById('detail-entries');
  if (!data.eintraege.length) {
    list.innerHTML = '<div class="empty" style="margin-top:20px">Noch keine Buchungen.</div>';
    return;
  }
  list.innerHTML = data.eintraege.map(e => `
    <div class="entry-row">
      <div class="entry-dot" style="background:${e.kategorie_farbe || '#555'}"></div>
      <div class="entry-main">
        <div class="entry-beschr">${e.beschreibung || (e.betrag > 0 ? 'Einzahlung' : 'Abhebung')}</div>
        <div class="entry-kat">${e.kategorie_name || 'Ohne Kategorie'} · <span class="entry-datum">${e.datum}</span></div>
      </div>
      <div class="entry-betrag ${e.betrag > 0 ? 'pos' : 'neg'}">${e.betrag > 0 ? '+' : ''}${e.betrag.toFixed(2)} €</div>
      <button class="entry-del" onclick="deleteEntry('${e.id}')">🗑️</button>
    </div>
  `).join('');
}

async function openDetail(id) {
  currentMode = id ? 'pig' : 'general';
  currentPigId = id;
  renderDetail();
  openModal('modal-detail');
}

async function deleteEntry(entryId) {
  if (!confirm('Buchung löschen?')) return;
  await api('DELETE', `/api/spareintraege/${entryId}`);
  await loadAll();
  renderDetail();
}

// ─── Buchen (mit optionaler Sparschwein-Zuordnung) ────────────────────────
function openEntry() {
  document.getElementById('entry-betrag').value = '';
  document.getElementById('entry-beschreibung').value = '';

  const katSel = document.getElementById('entry-kategorie');
  katSel.innerHTML = '<option value="">Keine</option>' +
    kategorien.map(k => `<option value="${k.id}">${k.name}</option>`).join('');

  const pigSel = document.getElementById('entry-sparschwein');
  pigSel.innerHTML = '<option value="">Kein Sparschwein</option>' +
    pigs.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  pigSel.value = currentMode === 'pig' ? currentPigId : '';

  openModal('modal-entry');
}

async function saveEntry() {
  const betrag = document.getElementById('entry-betrag').value;
  const beschreibung = document.getElementById('entry-beschreibung').value;
  const kategorie_id = document.getElementById('entry-kategorie').value;
  const sparschwein_id = document.getElementById('entry-sparschwein').value;
  try {
    await api('POST', '/api/eintraege', { betrag, beschreibung, kategorie_id, sparschwein_id });
    closeModal('modal-entry'); toast('Gebucht');
    await loadAll();
    renderDetail();
  } catch (e) { toast(e.message); }
}

// ─── Kategorien ──────────────────────────────────────────────────────────
function renderKatList() {
  const list = document.getElementById('kat-list');
  if (!kategorien.length) { list.innerHTML = '<div class="empty" style="margin-top:8px">Noch keine Kategorien.</div>'; return; }
  list.innerHTML = kategorien.map(k => `
    <div class="kat-row">
      <div class="kat-dot" style="background:${k.farbe}"></div>
      <div class="kat-name">${k.name}</div>
      <button class="entry-del" onclick="deleteKategorie('${k.id}')">🗑️</button>
    </div>
  `).join('');
}

function openKategorien() {
  renderKatList();
  document.getElementById('kat-name').value = '';
  document.getElementById('kat-farbe').value = '#888888';
  openModal('modal-kategorien');
}

async function addKategorie() {
  const name = document.getElementById('kat-name').value;
  const farbe = document.getElementById('kat-farbe').value;
  if (!name.trim()) { toast('Name fehlt'); return; }
  try {
    await api('POST', '/api/kategorien', { name, farbe });
    kategorien = await api('GET', '/api/kategorien');
    document.getElementById('kat-name').value = '';
    renderKatList();
    toast('Kategorie angelegt');
  } catch (e) { toast(e.message); }
}

async function deleteKategorie(id) {
  if (!confirm('Kategorie löschen? Buchungen bleiben erhalten, verlieren aber die Zuordnung.')) return;
  await api('DELETE', `/api/kategorien/${id}`);
  kategorien = await api('GET', '/api/kategorien');
  renderKatList();
  await loadAll();
}

// ─── Statistik ───────────────────────────────────────────────────────────
async function openStats() {
  const rows = await api('GET', '/api/statistik');
  const list = document.getElementById('stats-list');
  const empty = document.getElementById('stats-empty');
  empty.style.display = rows.length ? 'none' : 'block';
  const max = Math.max(1, ...rows.map(r => Math.abs(r.summe)));
  list.innerHTML = rows.map(r => `
    <div class="stat-row">
      <div class="stat-head">
        <span>${r.name}</span>
        <span>${r.summe.toFixed(2)} €</span>
      </div>
      <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${Math.round(Math.abs(r.summe)/max*100)}%;background:${r.farbe}"></div></div>
      <div class="stat-sub">${r.anzahl} Buchung(en) · +${r.einzahlungen.toFixed(2)} € / -${r.abhebungen.toFixed(2)} €</div>
    </div>
  `).join('');
  document.getElementById('view-main').style.display = 'none';
  document.getElementById('view-stats').style.display = 'block';
}
function closeStats() {
  document.getElementById('view-stats').style.display = 'none';
  document.getElementById('view-main').style.display = 'block';
}

loadAll();
</script>
</body>
</html>
